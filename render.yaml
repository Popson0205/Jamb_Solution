services:
  - type: web
    name: jamb-allocator-api
    env: node
    plan: free
    buildCommand: cd api && npm install && npm run build
    startCommand: cd api && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jamb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TERMII_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_URL
        sync: false

  - type: static
    name: jamb-student-pwa
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: static
    name: jamb-admin-portal
    plan: free
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: jamb-db
    databaseName: jamb_allocator
    plan: free
