services:
  - type: web
    name: jamb-allocator-api
    env: node
    plan: free
    rootDir: api
    buildCommand: rm -rf dist && npm install --include=dev && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SENDER_ID
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_URL
        sync: false

  - type: web
    name: jamb-student-pwa
    env: node
    plan: free
    rootDir: client
    buildCommand: rm -rf dist && npm install --include=dev && npm run build
    startCommand: npx serve -s dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        sync: false

  - type: web
    name: jamb-admin-portal-v2
    env: node
    plan: free
    rootDir: portal
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://jamb-allocator-api.onrender.com
      - key: SESSION_SECRET
        generateValue: true
