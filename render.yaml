services:
  - type: web
    name: jamb-allocator-api
    env: node
    plan: free
    buildCommand: cd api && npm install && npm run build
    startCommand: cd api && node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TERMII_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_URL
        sync: false

  - type: web
    name: jamb-student-pwa
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build && npm install -g serve
    startCommand: serve -s client/dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: jamb-admin-portal
    env: node
    plan: free
    buildCommand: cd admin && npm install && npm run build && npm install -g serve
    startCommand: serve -s admin/dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production
